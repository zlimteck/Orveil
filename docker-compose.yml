services:
  mongodb:
    image: mongo:8
    container_name: orveil-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-orveil}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS:-orveil_pass}
      MONGO_INITDB_DATABASE: orveil
    volumes:
      - mongo_data:/data/db
    networks:
      - orveil
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: orveil-docker-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      INFO: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - orveil

  apprise:
    image: caronc/apprise:latest
    container_name: orveil-apprise
    restart: unless-stopped
    ports:
      - "127.0.0.1:8008:8000"
    networks:
      - orveil

  app:
    image: zlimteck/orveil:latest
    container_name: orveil
    restart: unless-stopped
    ports:
      - "3050:5050"
    environment:
      MONGODB_URI: mongodb://${MONGO_USER:-orveil}:${MONGO_PASS:-orveil_pass}@mongodb:27017/orveil?authSource=admin
      APPRISE_API_URL: http://apprise:8000
      PORT: 5050
      NODE_ENV: production
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required - run: openssl rand -hex 32}"
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      DOCKER_PROXY_URL: http://docker-proxy:2375
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-orveil}
      METRICS_TOKEN: ${METRICS_TOKEN:-}
    depends_on:
      mongodb:
        condition: service_healthy
      apprise:
        condition: service_started
      docker-proxy:
        condition: service_started
    networks:
      - orveil

  prometheus:
    image: prom/prometheus:latest
    container_name: orveil-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    depends_on:
      - app
    networks:
      - orveil
    profiles:
      - monitoring

volumes:
  mongo_data:
  prometheus_data:


networks:
  orveil:
    driver: bridge
